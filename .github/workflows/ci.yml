name: CI

on:
  push:
    branches:
      - "main"
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

env:
  src_path_suffix: "-develop/"
  HEROKU_DISABLE_AUTOUPDATE: 1
  HATCHET_RETRIES: 3
  IS_RUNNING_ON_CI: true
  HATCHET_APP_LIMIT: 300
  HATCHET_APP_PREFIX: ${{ format('htcht-{0}-', github.run_id) }}
  HATCHET_EXPENSIVE_MODE: 1
  HATCHET_BUILDPACK_BASE: https://github.com/heroku/heroku-buildpack-php
  HATCHET_BUILDPACK_BRANCH: ${{ github.head_ref || github.ref_name }}
  HEROKU_API_KEY: ${{ secrets.HEROKU_API_KEY }}
  HEROKU_API_USER: ${{ secrets.HEROKU_API_USER }}
  GIT_HTTP_LOW_SPEED_LIMIT: 1000
  GIT_HTTP_LOW_SPEED_TIME: 300

jobs:
  integration-test:
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        stack: ["heroku-22", "heroku-24"]
    env:
      STACK: ${{ matrix.stack }}
      BLACKFIRE_CLIENT_ID:  ${{ secrets.BLACKFIRE_CLIENT_ID }}
      BLACKFIRE_CLIENT_TOKEN: ${{ secrets.BLACKFIRE_CLIENT_TOKEN }}
      BLACKFIRE_SERVER_ID: ${{ secrets.BLACKFIRE_SERVER_ID }}
      BLACKFIRE_SERVER_TOKEN: ${{ secrets.BLACKFIRE_SERVER_TOKEN }}
    steps:
      - name: Checkout
        id: checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
      - name: Info
        run: |
          echo "Checkout outputs.ref: ${{ steps.checkout.outputs.ref }}"
          echo "Checkout outputs.commit: ${{ steps.checkout.outputs.commit }}"
          echo "github.ref: ${{ github.ref }}"
          echo "github.ref_name: ${{ github.ref_name }}"
          echo "\$GITHUB_REF: $GITHUB_REF"
          echo "\$GITHUB_REF_NAME: $GITHUB_REF_NAME"
      - name: Test overwriting of GITHUB_REF
        run: |
          echo "GITHUB_REF='${{ steps.checkout.outputs.ref }}'" >> "$GITHUB_ENV"
      - name: See if that worked
        run: |
          echo "github.ref: ${{ github.ref }}"
          echo "github.ref_name: ${{ github.ref_name }}"
          echo "\$GITHUB_REF: $GITHUB_REF"
          echo "\$GITHUB_REF_NAME: $GITHUB_REF_NAME"
